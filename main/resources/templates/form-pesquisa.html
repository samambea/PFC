<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Criar Nova Pesquisa</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        .form-container {
            background-color: #fff;
            max-width: 800px;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ccc;
            color: #333;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .back-button:hover {
            background-color: #bbb;
        }

        h2 {
            color: #2e7d64;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .button {
            background-color: #2e7d64;
            color: #fff;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 20px;
            width: 100%;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .button:hover {
            background-color: #256d56;
        }
    </style>
</head>
<body>

<div class="form-container">
    <a href="/home" class="back-button">← Voltar</a>

    <h2>Criar Nova Pesquisa</h2>

    <form th:action="@{/pesquisas/nova}" method="post">
        <!-- CSRF Token necessário para Spring Security -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label for="nomePesquisa">Nome da Pesquisa</label>
        <input type="text" id="nomePesquisa" name="nomePesquisa" required>

        <label for="descricao">Descrição</label>
        <textarea id="descricao" name="descricao" rows="4" required></textarea>

        <label for="objetivo">Objetivo</label>
        <textarea id="objetivo" name="objetivo" rows="3" required></textarea>

        <label for="instituicao">Instituição</label>
        <input type="text" id="instituicao" name="instituicao" required>

        <label for="areaDaPesquisa">Área da Pesquisa</label>
        <input type="text" id="areaDaPesquisa" name="areaDaPesquisa" required>

        <label for="pesquisadorResponsavel">Pesquisador Responsável</label>
        <input type="text" id="pesquisadorResponsavel" name="pesquisadorResponsavel" required>

        <label for="criteriosInclusaoExclusao">Critérios de Inclusão/Exclusão</label>
        <textarea id="criteriosInclusaoExclusao" name="criteriosInclusaoExclusao" rows="3" required></textarea>

        <label for="statusPesquisa">Status da Pesquisa</label>
        <select id="statusPesquisa" name="statusPesquisa" required>
            <option value="ABERTA">Aberta</option>
            <option value="FECHADA">Fechada</option>
            <option value="CANCELADA">Cancelada</option>
            <option value="CONCLUIDA">Concluída</option>
        </select>

        <button class="button" type="submit">Salvar Pesquisa</button>
    </form>
</div>

</body>
</html>
