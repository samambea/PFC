<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Minhas Pesquisas</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f2f4f3;
        }

        .navbar {
            background-color: #2AA184;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .navbar .logo {
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .navbar .profile-button {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .main {
            display: flex;
        }

        .sidebar {
            background-color: #2AA184;
            width: 220px;
            min-height: calc(100vh - 60px);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar a {
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .sidebar a.active, .sidebar a:hover {
            background-color: #d6e9e7;
            color: #000;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .content {
            flex: 1;
            padding: 40px;
        }

        .pesquisa-card {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
        }

        .pesquisa-card h2 {
            margin: 0;
            color: #2AA184;
        }

        .pesquisa-card p {
            color: #333;
        }

        .pesquisa-card .status {
            font-style: italic;
            color: #666;
        }

        .btn-editar, .btn-excluir {
    padding: 8px 16px;
    margin-right: 8px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    text-decoration: none;
    font-size: 0.95rem;
    transition: background-color 0.3s ease;
}

.btn-editar {
    background-color: #2AA184;
    color: white;
}

.btn-editar:hover {
    background-color: #218f74;
}

.btn-excluir {
    background-color: #e74c3c;
    color: white;
}

.btn-excluir:hover {
    background-color: #c0392b;
}

    </style>
</head>
<body>

<div class="navbar">
    <div class="logo">Apollo Pesquisas</div>
    <a href="/home" class="profile-button">Tela Inicial</a>
</div>

<div class="main">
    <div class="sidebar">
        <a th:href="@{/perfil}" class="active">Meu Perfil</a>
        <a href="#" class="active">Minhas Pesquisas</a>
        <a href="/perfil/voluntarios-inscritos" class="active">Voluntários Inscritos</a>
        <a href="/pesquisador/agenda">Minha Agenda</a>
    </div>

    <div class="content">
        <h1>Minhas Pesquisas Cadastradas</h1>


        <div th:each="pesquisa : ${pesquisas}" class="pesquisa-card">
            <h2 th:text="${pesquisa.nomePesquisa}">Título da Pesquisa</h2>
            <p th:text="${pesquisa.descricao}">Descrição da pesquisa aqui...</p>
            <p class="status">Status: <span th:text="${pesquisa.statusPesquisa}">ABERTA</span></p>
            <div>
                <a th:href="@{'/pesquisas/' + ${pesquisa.pesquisaId} + '/editar'}" class="btn-editar">Editar</a>
                <form th:action="@{'/pesquisas/' + ${pesquisa.pesquisaId} + '/excluir'}" method="post" style="display:inline;">
                    <button type="submit" class="btn-excluir" onclick="return confirm('Tem certeza de que deseja excluir esta pesquisa?')">Excluir</button>
                </form>
            </div>
        </div>

    </div>
</div>

</body>
</html>
