<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Apollo Pesquisas</title>
    <meta charset="UTF-8">
    <style>
        /* Estilos padrão */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f1f3f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
            padding: 0 20px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            background-color: white;
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .container:hover {
            transform: translateY(-10px);
        }

        h1 {
            color: #2AA184;
            margin-bottom: 2rem;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .title-divider {
            width: 50px;
            height: 3px;
            background-color: #2AA184;
            margin: 1rem auto;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        a.button {
            display: block;
            text-decoration: none;
            background-color: #2AA184;
            color: white;
            padding: 1rem;
            margin: 0.5rem 0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        a.button:hover {
            background-color: #249073;
            transform: scale(1.05);
        }

        a.logout {
            font-size: 14px;
            margin-top: 1.5rem;
            display: inline-block;
            color: #888;
            text-decoration: none;
            font-weight: 500;
        }

        a.logout:hover {
            text-decoration: underline;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #888;
        }

        .footer a {
            color: #2AA184;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('/images/scientist.jpg'); /* Imagem de fundo */
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            z-index: -1;
        }

        /* Estilos para dark mode */
        body.dark-mode {
            background-color: #333;
            color: #f1f3f6;
        }

        .container.dark-mode {
            background-color: #444;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        h1.dark-mode {
            color: #2AA184;
        }

        a.button.dark-mode {
            background-color: #2AA184;
        }

        a.logout.dark-mode {
            color: #bbb;
        }

        .dark-mode-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: transparent;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .dark-mode-toggle img {
            width: 30px;
            height: 30px;
            transition: transform 0.3s ease;
        }

        .dark-mode-toggle:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

<div class="background-image"></div>

<button class="dark-mode-toggle" id="darkModeToggle">
    <!-- Ícone do sol (light mode) -->
    <img id="modeIcon" src="images/sun.png" alt="Modo Claro">
</button>

<div class="container">
    <h1>Bem-vindo à Apollo Pesquisas!</h1>
    <div class="title-divider"></div>

    <div class="button-container">
        <a href="/auth/cadastro/voluntario" class="button">Cadastrar Voluntário</a>
        <a href="/auth/cadastro/pesquisador" class="button">Cadastrar Pesquisador</a>
        <a href="/auth/login" class="button">Login</a>
    </div>

    <a href="/logout" class="logout">Sair</a>
</div>

<div class="footer">
    <p>&copy; 2025 Apollo Pesquisas | <a href="/privacy-policy">Política de Privacidade</a></p>
</div>

<script>
    const toggleButton = document.getElementById('darkModeToggle');
    const body = document.body;
    const container = document.querySelector('.container');
    const h1 = document.querySelector('h1');
    const logoutLink = document.querySelector('.logout');
    const buttons = document.querySelectorAll('.button');
    const modeIcon = document.getElementById('modeIcon');

    toggleButton.addEventListener('click', () => {
        // darkmode e lightmode
        body.classList.toggle('dark-mode');
        container.classList.toggle('dark-mode');
        h1.classList.toggle('dark-mode');
        logoutLink.classList.toggle('dark-mode');
        buttons.forEach(button => button.classList.toggle('dark-mode'));

        // trocar ícone de modo claro (sol) e escuro (lua)
        if (body.classList.contains('dark-mode')) {
            modeIcon.src = "images/moon.png";  // Lua no dark mode
            modeIcon.alt = "Modo Escuro";
        } else {
            modeIcon.src = "images/sun.png";   // Sol no light mode
            modeIcon.alt = "Modo Claro";
        }
    });
</script>

</body>
</html>
