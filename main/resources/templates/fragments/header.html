<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:hover="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Apollo Pesquisas</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.3/dist/tailwind.min.js"></script>
</head>
<body>
<header class="bg-[#2AA184] text-white shadow-md" th:fragment="header">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
        <div class="flex items-center space-x-3">

            <img th:src="@{/images/logo.png}" alt="Apollo Pesquisas Logo" class="w-12 h-12">
            <span class="font-bold text-xl text-shadow-black select-none">Apollo Pesquisas</span>
        </div>
        <div class="flex items-center space-x-4">
            <div th:if="${#httpServletRequest.userPrincipal != null}" class="relative">

                <button class="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 rounded-md font-semibold" type="button">
                    <span th:text="${#httpServletRequest.userPrincipal.name}">Usuário</span>
                </button>

                <button
                        id="dark-mode-toggle"
                        aria-label="Toggle light/dark mode"
                        class="ml-2 p-2 rounded-md bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors"
                        type="button"
                        title="Toggle light/dark mode"
                >
                    <i class="fas fa-moon"></i>
                </button>

                <div class="absolute right-0 mt-2 w-48 bg-white border border-gray-300 rounded-md shadow-lg hidden group-hover:block">
                    <ul class="space-y-2 p-2">
                        <li>
                            <a href="/perfil" class="block text-gray-700 px-4 py-2 text-sm">Meu Perfil</a>
                        </li>
                        <li>
                            <a href="/logout" class="block text-gray-700 px-4 py-2 text-sm">Logout</a>
                        </li>
                        <li>
                            <a href="/pesquisas" class="block text-gray-700 px-4 py-2 text-sm">Minhas Pesquisas</a>
                        </li>
                    </ul>
                </div>
            </div>

            <div th:if="${#httpServletRequest.userPrincipal == null}" class="flex space-x-4">
                <button type="button" class="hover:bg-green-500 transition-colors rounded-md px-4 py-2 font-semibold text-white">
                    Acesse Sua Conta
                </button>
                <button class="bg-black hover:bg-gray-900 transition-colors rounded-md px-4 py-2 font-semibold text-white" type="button">
                    Se Cadastre!
                </button>
            </div>
        </div>
    </div>
</header>

<script>

    const userButton = document.querySelector('button');
    const dropdown = document.querySelector('.dropdown-menu');

    userButton.addEventListener('click', () => {
        dropdown.classList.toggle('hidden');
    });

    // dark mode
    const darkModeToggle = document.getElementById('dark-mode-toggle');
    if (darkModeToggle) {
        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            const icon = darkModeToggle.querySelector('i');
            if (document.documentElement.classList.contains('dark')) {
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            } else {
                icon.classList.remove('fa-sun');
                icon.classList.add('fa-moon');
            }
        });
    }
</script>
</body>
</html>
