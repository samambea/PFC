<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apollo Pesquisas - Feedback</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
        }

        .container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .left {
            width: 50%;
            text-align: center;
            padding: 2rem;
        }

        .ellipse {
            width: 380px;
            height: 280px;
            background: repeating-linear-gradient(
                    45deg,
                    #cceeee,
                    #cceeee 10px,
                    #b8dada 10px,
                    #b8dada 20px
            );
            border-radius: 50% / 40%;
            margin: 0 auto 1rem;
        }

        .left p {
            max-width: 400px;
            margin: 0 auto;
            font-size: 14px;
            color: #333;
        }

        .right {
            width: 400px;
            background-color: #2AA184;
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            color: white;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .logo::before {
            content: "";
            position: absolute;
            width: 60px;
            height: 60px;
            background: url('/images/logo-apollo.png') no-repeat center center;
            background-size: contain;
            top: -40px;
            left: calc(50% - 30px);
        }

        .logo-img {
            width: 180px;
            display: block;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"] {
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background-color: white;
            color: #26A69A;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .register {
            margin-top: 1rem;
            font-size: 14px;
        }

        .register a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .home-icon {
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .home-icon img {
            width: 30px;
        }
    </style>
</head>
<body>

<div class="home-icon">
    <a href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
    </a>
</div>

<div class="container">
    <div class="left">
        <div class="ellipse"></div>
        <p>
            Por favor, preencha os campos abaixo para nos dar o seu feedback!
        </p>
    </div>
    <div class="right">
        <div class="logo">
            <img src="/images/logo-apollo.jpg" alt="Apollo Pesquisas" class="logo-img"></div>
        <form action="/feedbacks" method="post">
            <input type="text" name="comentario" placeholder="Comentário" required/>
            <input type="number" name="nota" placeholder="Nota (1 a 5)" min="1" max="5" required/>
            <button type="submit">Enviar Feedback</button>
        </form>
    </div>
</div>
</body>
</html>
