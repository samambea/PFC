<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Apollo Pesquisas</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #e6f2f1;
            color: #333;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        .left {
            flex: 1;
            min-width: 300px;
            text-align: center;
            padding: 2rem;
        }

        .ellipse {
            width: 260px;
            height: 180px;
            background: repeating-linear-gradient(
                    45deg,
                    #cceeee,
                    #cceeee 10px,
                    #b8dada 10px,
                    #b8dada 20px
            );
            border-radius: 50% / 40%;
            margin: 0 auto 2rem;
        }

        .left p {
            max-width: 400px;
            margin: 0 auto;
            font-size: 16px;
            color: #555;
            line-height: 1.5;
        }

        .right {
            width: 100%;
            max-width: 420px;
            background-color: #2AA184;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            color: white;
            box-sizing: border-box;
            margin: 0 20px;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        label {
            font-size: 14px;
            text-align: left;
            margin-bottom: 0.3rem;
            font-weight: 600;
        }

        input,
        select {
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: #2AA184;
            outline: none;
        }

        .row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .row input {
            flex: 1;
            min-width: 100%; /* Forçando todos os inputs a ter a mesma largura */
        }

        button {
            background-color: white;
            color: #2AA184;
            padding: 0.8rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            margin-top: 1.5rem;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #e6f3f1;
        }

        .terms {
            font-size: 12px;
            text-align: center;
            margin-top: 1rem;
        }

        .login-link {
            margin-top: 1.5rem;
            font-size: 14px;
            text-align: center;
        }

        .login-link a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .home-icon {
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .home-icon img {
            width: 28px;
        }

        .message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="home-icon">
    <a href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
    </a>
</div>

<div class="container">
    <div class="left">
        <div class="ellipse"></div>
        <p>
            Você é essencial. Junte-se a nós para transformar o futuro da pesquisa! Criamos oportunidades para aqueles que querem fazer a diferença.
        </p>
    </div>
    <div class="right">
        <div class="logo">
            <img src="/images/logo-apollo.png" alt="Apollo Pesquisas" style="max-width: 180px; margin: 0 auto 1.5rem auto; display: block;">
        </div>

        <div th:if="${mensagem}" class="message">
            <p th:text="${mensagem}"></p>
        </div>

        <form th:action="@{/auth/cadastro/voluntario}" th:object="${usuario}" method="post">
            <label>Nome:</label>
            <input type="text" th:field="*{nome}" required />

            <label>E-mail:</label>
            <input type="email" th:field="*{email}" required />

            <label>Senha:</label>
            <input type="password" th:field="*{senha}" required />

            <div th:if="${usuario instanceof T(br.com.umc.apollopesquisas.model.Voluntario)}">
                <div class="row">
                    <div>
                        <label>Telefone:</label>
                        <input type="text" th:field="*{telefone}" required />
                    </div>
                    <div>
                        <label>Endereço:</label>
                        <input type="text" th:field="*{endereco}" required />
                    </div>
                </div>
            </div>

            <div class="terms">Ao se cadastrar, você está de acordo com os termos e condições da plataforma.</div>

            <button type="submit">Criar Conta</button>

            <div class="login-link">
                Já tem uma conta? <a href="/auth/login">Faça seu login!</a>
            </div>

            <script th:if="${mensagem}">
                alert([[${mensagem}]]);
            </script>
        </form>
    </div>
</div>
</body>
</html>
