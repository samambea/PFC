<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apollo Pesquisas Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .diagonal-stripes {
            background: repeating-linear-gradient(
                    45deg,
                    #bfdbfe 0,
                    #bfdbfe 5px,
                    transparent 5px,
                    transparent 10px
            );
        }
        .text-shadow {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">
<div class="flex flex-col md:flex-row w-full max-w-6xl shadow-lg rounded-lg overflow-hidden">
    <div class="md:w-1/2 bg-white p-10 flex flex-col items-center space-y-8">
        <div class="self-start">
            <i class="fas fa-home text-3xl rounded-xl bg-gray-200 p-3"></i>
        </div>
        <div class="w-48 h-48 rounded-full diagonal-stripes bg-white bg-opacity-30"></div>
        <p class="text-center text-black text-base max-w-xs">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
        </p>
    </div>
    <div class="md:w-1/2 bg-teal-600 p-10 flex flex-col items-center rounded-lg">
        <div class="mb-8 flex flex-col items-center">
            <img th:src="@{/images/logo.png}" alt="Apollo Logo" class="h-24 mb-4 logo-shadow" />
        </div>
        <form class="w-full max-w-sm space-y-6" method="post" action="/register">
            <div>
                <label for="email" class="block text-white mb-2 font-medium">E-mail</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white text-black" />
            </div>
            <div>
                <label for="password" class="block text-white mb-2 font-medium">Password</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white text-black" />
            </div>
            <div>
                <label for="confirm-password" class="block text-white mb-2 font-medium">Confirm Password</label>
                <input type="password" id="confirm-password" name="confirm-password" required
                       class="w-full px-4 py-2 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white text-black" />
            </div>
            <p class="text-center text-teal-200 text-sm">
                Ao se registrar, você concorda com os termos e condições da plataforma.
            </p>
            <button type="submit"
                    class="w-full border border-white text-white font-bold py-2 rounded-md hover:bg-white hover:text-teal-600 transition-colors duration-300">
                Criar Conta
            </button>
        </form>
        <p class="mt-8 text-white font-bold text-center">
            Já tem uma conta? <a href="/login" class="text-teal-200 underline">Faça login!</a>
        </p>
    </div>
</div>

<div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-2 rounded mb-4">
    <p th:text="${error}"></p>
</div>

</body>
</html>
