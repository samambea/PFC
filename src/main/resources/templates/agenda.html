<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda - Apollo Pesquisas</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f2f4f3;
        }
        .navbar {
            background-color: #2AA184;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .navbar .logo {
            display: flex;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .navbar .profile-button {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .sidebar {
            background-color: #2AA184;
            width: 220px;
            min-height: calc(100vh - 60px);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar a {
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            display: block;
            font-weight: 500;
        }
        .sidebar a.active, .sidebar a:hover {
            background-color: #d6e9e7;
            color: #000;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        .main {
            display: flex;
        }
        .content {
            flex: 1;
            padding: 40px;
        }
        .title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #0f241b;
        }
        .agenda-container {
            display: flex;
            gap: 50px;
            margin-top: 30px;
        }
        .calendar {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 12px;
            width: 250px;
            text-align: center;
        }
        .calendar-header {
            font-weight: bold;
            margin-bottom: 10px;
        }
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 10px;
            font-weight: bold;
        }
        .calendar-dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .calendar-dates div {
            padding: 8px;
            border-radius: 50%;
        }
        .highlight {
            background-color: black;
            color: white;
        }
        .agendamentos-list {
            flex: 1;
        }
        .agendamento-item {
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">Apollo Pesquisas</div>
    <button class="profile-button">Meu Perfil</button>
</div>

<!-- Main Content -->
<div class="main">
    <div class="sidebar">
        <a href="/perfil">Meu Perfil</a>
        <a href="/participacoes">Minhas Participações</a>
        <a href="/agenda" class="active">Minha Agenda</a>
    </div>

    <div class="content">
        <!-- Agenda Title -->
        <div class="title">Minha Agenda</div>

        <!-- Agenda Container -->
        <div class="agenda-container">
            <div class="calendar">
                <div class="calendar-header">
                    <span th:text="${mesAtual} + ' ' + ${anoAtual}"></span>
                </div>
                <div class="calendar-days">
                    <div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div>
                </div>
                <div class="calendar-dates">
                    <div th:each="dia : ${diasDoMes}"
                         th:text="${dia}"
                         th:classappend="${diasComAgendamento.contains(dia)} ? 'highlight' : ''">
                    </div>
                </div>
            </div> <!-- fecha calendar -->

            <div class="agendamentos-list">
                <div th:each="agendamento : ${agendamentos}" class="agendamento-item">
                    <span th:if="${agendamento.dataAgendamento != null}"
                          th:text="${#temporals.format(agendamento.dataAgendamento, 'dd/MM')}"></span>:
                    <span th:text="${agendamento.tipo}"></span> -
                    <span th:text="${agendamento.localAgendamento}"></span>
                </div>
            </div> <!-- fecha agendamentos-list -->

        </div> <!-- fecha agenda-container -->
    </div>
</div>

</body>
</html>
