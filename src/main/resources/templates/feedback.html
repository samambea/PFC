<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Feedback</title>
    <style>
        /* Estilização global da página */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; /* Fonte moderna e legível */
            background-color: #f4f4f4; /* Cor de fundo suave */
            margin: 0;
            padding: 0;
        }

        /* Container centralizado para o formulário */
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }

        /* Título do formulário */
        h2 {
            color: #2e7d64;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Rótulos dos campos */
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        /* Campos de entrada e textarea */
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 1em;
        }

        /* Botão de envio do formulário */
        button {
            background-color: #1e5f4c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        /* Efeito hover no botão */
        button:hover {
            background-color: #144a3a;
        }

        /* Botão de link para voltar */
        .link-button {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: #2e7d64;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Efeito hover no botão de link */
        .link-button:hover {
            background-color: #1e5f4c;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Título da página de feedback -->
    <h2>Deixe seu Feedback</h2>
    <!-- Mensagem dinâmica de teste, pode ser usada para avisos ou instruções -->
    <p th:text="${mensagemTeste}">Mensagem padrão</p>

    <!-- Formulário de feedback, vinculado ao objeto 'feedback' do backend -->
    <form th:action="@{/feedbacks}" method="post" th:object="${feedback}">
        <!-- Campo para nota de 1 a 5 -->
        <label for="nota">Nota (1 a 5):</label>
        <input type="number" id="nota" name="nota" th:field="*{nota}" min="1" max="5" required>

        <!-- Campo para comentário do usuário -->
        <label for="comentario">Comentário:</label>
        <textarea id="comentario" name="comentario" th:field="*{comentario}" rows="4" required></textarea>

        <!-- Campo para nome da pesquisa (pode ser textarea para permitir nomes longos) -->
        <label for="nomePesquisa">Nome da Pesquisa:</label>
        <textarea id="nomePesquisa" name="nomePesquisa" th:field="*{nomePesquisa}" rows="4" required></textarea>

        <label for="nomeVoluntario">Nome do Voluntário:</label>
        <textarea id="nomeVoluntario" name="nomeVoluntario" th:field="*{nomeVoluntario}" rows="4" required></textarea>

        <!-- Campo oculto para o ID da participação (caso necessário para o backend) -->
        <input type="hidden" name="participacaoId" th:value="${participacaoId}" />

        <!-- Botão para enviar o feedback -->
        <button type="submit">Enviar Feedback</button>
    </form>

    <!-- Botão para voltar para a página inicial -->
    <a href="/home" class="link-button">🏠 Voltar para Home</a>
</div>

<!-- Script para exibir alerta de sucesso e redirecionar, caso o feedback seja enviado -->
<script th:if="${success}" th:inline="javascript">
    alert("Feedback enviado com sucesso!");
    window.location.href = /*[[@{/home-voluntario}]]*/ "/home-voluntario";
</script>

</body>
</html>
