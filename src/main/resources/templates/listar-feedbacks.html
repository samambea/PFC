<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Feedbacks</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 {
            color: #2AA184;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
        }

        th {
            background-color: #2AA184;
            color: white;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .acoes-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* Espaço entre os botões */
        }

        .btn-voltar {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #2AA184;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-voltar:hover {
            background-color: #23846c;
        }

        .btn {
            padding: 6px 12px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-edit {
            background-color: #d0f0e8;
            color: #2e7d64;
        }

        .btn-edit:hover {
            background-color: #c2e6dc;
        }

        .btn-delete {
            background-color: #fbd6d4;
            color: #d64545;
        }

        .btn-delete:hover {
            background-color: #f9c9c7;
        }
    </style>
</head>
<body>

<h2>Feedbacks Recebidos</h2>

<table>
    <thead>
    <tr>
        <th>Nota</th>
        <th>Comentário</th>
        <th>Pesquisa</th>
        <th>Voluntário</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="feedback : ${feedbacks}">
        <td th:text="${feedback.nota}">5</td>
        <td th:text="${feedback.comentario}">Muito bom!</td>
        <td th:text="${feedback.nomePesquisa}">Pesquisa X</td>
        <td th:text="${feedback.nomeVoluntario}">João Silva</td>
        <td>
            <div class="acoes-container">
                <a th:href="@{'/feedbacks/editar/' + ${feedback.feedbackId}}" class="btn btn-edit">Editar</a>
                <a th:href="@{'/feedbacks/excluir/' + ${feedback.feedbackId}}"
                   class="btn btn-delete"
                   onclick="return confirm('Tem certeza que deseja excluir este feedback?');">Excluir</a>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<a href="/admin/usuarios" class="btn-voltar">⬅ Voltar</a>

</body>
</html>
