<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Eventos</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2AA184;
            margin-bottom: 30px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
        }

        th {
            background-color: #2AA184;
            color: white;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn {
            padding: 6px 12px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-right: 8px;
        }

        .btn-edit {
            background-color: #d0f0e8;
            color: #2e7d64;
        }

        .btn-edit:hover {
            background-color: #c2e6dc;
        }

        .btn-delete {
            background-color: #fbd6d4;
            color: #d64545;
        }

        .btn-delete:hover {
            background-color: #f9c9c7;
        }

        .btn-novo {
            display: inline-block;
            background-color: #2AA184;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .btn-novo:hover {
            background-color: #23846c;
        }

        .btn-voltar {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #2AA184;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }

        .btn-voltar:hover {
            background-color: #23846c;
        }

        .acoes {
            display: flex;
            flex-wrap: nowrap;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Título da página -->
    <h1>Eventos</h1>

    <!-- Botão para criar um novo evento -->
    <a th:href="@{/eventos/novo}" class="btn-novo">+ Criar Novo Evento</a>

    <!-- Tabela que lista os eventos cadastrados -->
    <table>
        <thead>
        <tr>
            <th>Título</th>
            <th>Data</th>
            <th>Local</th>
            <th>Link</th>
            <th>Imagem</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <!-- Loop Thymeleaf para exibir cada evento da lista -->
        <tr th:each="evento : ${eventos}">
            <!-- Exibe o título do evento -->
            <td th:text="${evento.tituloEvento}">Título</td>
            <!-- Exibe a data do evento formatada para dd/MM/yyyy -->
            <td th:text="${#temporals.format(evento.dataEvento, 'dd/MM/yyyy')}">Data</td>
            <!-- Exibe o local do evento -->
            <td th:text="${evento.localEvento}">Local</td>
            <!-- Link para acessar o evento (abre em nova aba) -->
            <td><a th:href="${evento.link}" target="_blank">Ver Link</a></td>

            <td>
                <img th:src="@{'/uploads/imagens/' + ${evento.nomeImagem}}" alt="Imagem do evento" style="max-width: 200px;"/>
            </td>
            <td>
                <div class="acoes">
                    <a th:href="@{'/eventos/editar/' + ${evento.eventoId}}" class="btn btn-edit">Editar</a>
                    <a th:href="@{'/eventos/excluir/' + ${evento.eventoId}}" class="btn btn-delete"
                       onclick="return confirm('Confirma exclusão?')">Excluir</a>
                </div>
            </td>

        </tr>
        </tbody>
    </table>

    <div>
        <!-- Botão para voltar à home, visível apenas para usuários com papel ADMIN -->
        <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
           th:href="@{/admin/usuarios/lista-usuarios}"
           class="btn-voltar">⬅ Voltar para Home</a>
    </div>
</div>

</body>
</html>
