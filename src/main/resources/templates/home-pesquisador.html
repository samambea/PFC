<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Início - Apollo Pesquisas</title>
    <!-- Importa ícones do Font Awesome para uso nos botões e notificações -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        /* Estilização global da página */
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; /* Fonte moderna e legível */
            background-color: #f4f4f4; /* Cor de fundo suave */
        }

        /* Barra de navegação superior */
        .navbar {
            background-color: #2e7d64; /* Cor personalizada */
            color: #fff;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Logo da aplicação */
        .logo {
            font-size: 1.5em;
            font-weight: bold;
        }

        /* Menu de navegação na navbar */
        .menu {
            display: flex;
            align-items: center;
        }

        /* Links do menu */
        .menu a {
            color: #fff;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 500;
        }

        /* Efeito hover nos links do menu */
        .menu a:hover {
            text-decoration: underline;
        }

        /* Botões de perfil */
        .profile-button {
            border: 1px solid #fff;
            border-radius: 6px;
            padding: 6px 12px;
        }

        /* Botões de ação (criar pesquisa, listar sugestões) */
        .create-button {
            background-color: #1e5f4c;
            padding: 10px 20px;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
            margin-left: 20px;
        }

        /* Efeito hover nos botões de ação */
        .create-button:hover {
            background-color: #144a3a;
        }

        /* Container principal da página */
        .container {
            padding: 40px 20px;
            max-width: 900px;
            margin: auto;
            background-color: #fff;
            margin-top: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }


        .dropdown .item {
            padding: 8px 10px;
            border-bottom: 1px solid #ddd;
        }

        .dropdown .item:last-child {
            border-bottom: none;
        }

        /* Título principal da página */
        h1 {
            color: #2e7d64;
            text-align: center;
        }

        /* Parágrafo de boas-vindas */
        p {
            text-align: center;
            color: #555;
        }
    </style>
</head>
<body>

<!-- Barra de navegação superior com logo, menu e notificações -->
<div class="navbar">
    <div class="logo">Apollo Pesquisas</div>
    <div class="menu">
        <!-- Botão para acessar o perfil -->
        <a class="profile-button" href="/perfil">Meu Perfil</a>
        <!-- Botão para editar o perfil -->
        <a class="profile-button" href="/perfil/editar">Editar Perfil</a>
        <!-- Botão para criar nova pesquisa -->
        <a class="create-button" href="pesquisas/nova">
            <i class="fas fa-plus"></i> Criar Pesquisa
        </a>
        <!-- Botão para listar sugestões -->
        <a class="create-button" href="/sugestoes">
            <i class="fas fa-lightbulb"></i> Listar Sugestões
        </a>
        <!-- Botão para logout -->
        <a href="/logout">Sair</a>
    </div>
</div>

<!-- Container principal com mensagem de boas-vindas -->
<div class="container">
    <h1>Bem-vindo ao Apollo Pesquisas</h1>
    <p>Essa é a página inicial do sistema. Aqui você pode navegar pelas funcionalidades disponíveis.</p>
</div>

<script>
    // Aqui você pode adicionar scripts para buscar e exibir notificações dinamicamente
    // Exemplo: manipulação do dropdown de notificações
</script>

</body>
</html>
