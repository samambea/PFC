<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            width: 100%;
            max-width: 420px;
            background-color: #2AA184;
            color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 22px;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        label {
            font-size: 14px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
        }

        input {
            margin-top: 4px;
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: white;
            color: #2AA184;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.3s ease;
            width: 100%;
            max-width: 320px;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #e6f3f1;
        }
    </style>
</head>

<body>
<div class="form-container">
    <h2>Editar Voluntário</h2>
    <form th:action="@{/admin/usuarios/salvar-voluntario}" th:object="${usuario}" method="post">
        <input type="hidden" th:field="*{usuarioId}" />
        <label>Nome:
            <input th:field="*{nome}" required />
        </label>
        <label>Email:
            <input th:field="*{email}" required />
        </label>
        <label>Telefone:
            <input th:field="*{telefone}" required />
        </label>
        <label>Endereço:
            <input th:field="*{endereco}" required />
        </label>
        <button type="submit">Salvar</button>
    </form>
</div>
</body>
</html>
