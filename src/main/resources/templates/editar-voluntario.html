<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <style>
        /* Estilização global da página */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif; /* Fonte moderna e legível */
            background-color: #f7f7f7; /* Cor de fundo suave */
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container do formulário centralizado */
        .form-container {
            width: 100%;
            max-width: 420px;
            background-color: #2AA184; /* Cor de fundo do card */
            color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        /* Título do formulário */
        .form-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 22px;
        }

        /* Layout dos campos do formulário */
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        /* Rótulos dos campos */
        label {
            font-size: 14px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
        }

        /* Campos de entrada */
        input {
            margin-top: 4px;
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Botão de submit */
        button {
            background-color: white;
            color: #2AA184;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.3s ease;
            width: 100%;
            max-width: 320px;
            margin-top: 1rem;
        }

        /* Efeito hover no botão */
        button:hover {
            background-color: #e6f3f1;
        }
    </style>
</head>

<body>
<div class="form-container">
    <!-- Título da página de edição de voluntário -->
    <h2>Editar Voluntário</h2>
    <!-- Formulário de edição, vinculado ao objeto 'usuario' do backend -->
    <form th:action="@{/admin/usuarios/salvar-voluntario}" th:object="${usuario}" method="post">
        <!-- Campo oculto para o ID do usuário (necessário para atualização) -->
        <input type="hidden" th:field="*{usuarioId}" />
        <!-- Campo para o nome do voluntário -->
        <label>Nome:
            <input th:field="*{nome}" required />
        </label>
        <!-- Campo para o email do voluntário -->
        <label>Email:
            <input th:field="*{email}" required />
        </label>
        <!-- Campo para telefone do voluntário -->
        <label>Telefone:
            <input th:field="*{telefone}" required />
        </label>
        <!-- Campo para endereço do voluntário -->
        <label>Endereço:
            <input th:field="*{endereco}" required />
        </label>
        <!-- Botão para salvar as alterações -->
        <button type="submit">Salvar</button>
    </form>
</div>
</body>
</html>
