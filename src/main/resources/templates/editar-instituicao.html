<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Instituição</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #2e7d64;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 1em;
        }

        button {
            background-color: #1e5f4c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        button:hover {
            background-color: #144a3a;
        }

        .link-button {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: #2e7d64;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .link-button:hover {
            background-color: #1e5f4c;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Editar Instituição</h2>
    <form th:action="@{'/instituicoes/' + ${instituicao.instituicaoId} + '/editar'}" th:object="${instituicao}" method="post">
        <label for="nomeInstituicao">Nome da Instituição:</label>
        <input type="text" id="nomeInstituicao" th:field="*{nomeInstituicao}" required>

        <label for="cnpj">CNPJ:</label>
        <input type="text" id="cnpj" th:field="*{cnpj}" required>

        <button type="submit">Salvar</button>
    </form>
    <a href="/instituicoes" class="link-button">Cancelar</a>
</div>
</body>
</html>
