<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apollo Pesquisas - Login</title>
    <style>
        /* Estilização global da página */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
        }

        /* Container centralizado para layout flexível */
        .container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        /* Coluna esquerda com ilustração e frase */
        .left {
            width: 50%;
            text-align: center;
            padding: 2rem;
        }

        .ellipse {
            width: 380px;
            height: 280px;
            background: repeating-linear-gradient(
                    45deg,
                    #cceeee,
                    #cceeee 10px,
                    #b8dada 10px,
                    #b8dada 20px
            );
            border-radius: 50% / 40%;
            margin: 0 auto 1rem;
        }

        .left p {
            max-width: 400px;
            margin: 0 auto;
            font-size: 14px;
            color: #333;
        }

        .right {
            width: 400px;
            background-color: #2AA184;
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            color: white;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .logo-img {
            width: 180px;
            display: block;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        input[type="text"],
        input[type="password"] {
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background-color: white;
            color: #26A69A;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .register {
            margin-top: 1rem;
            font-size: 14px;
        }

        .register a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .home-icon {
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .home-icon img {
            width: 30px;
        }

        /* Alerta de sucesso estilizado */
        .custom-alert {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: #d4edda;
            color: #155724;
            padding: 1rem 2rem;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
            animation: fadeSlideDown 0.5s ease-out;
        }

        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>
<body>

<!-- Alerta de sucesso visual -->
<div th:if="${successMessage}" class="custom-alert success">
    <span th:text="${successMessage}"></span>
</div>

<!-- Ícone de home -->
<div class="home-icon">
    <a href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
    </a>
</div>

<!-- Login layout principal -->
<div class="container">
    <div class="left">
        <div class="ellipse"></div>
        <p>A pesquisa começa com um login.</p>
    </div>
    <div class="right">
        <div class="logo">
            <img src="/images/logo-apollo.png" alt="Apollo Pesquisas" class="logo-img">
        </div>
        <form th:action="@{/auth/login}" method="post">
            <input type="text" name="username" placeholder="E-mail"/>
            <input type="password" name="password" placeholder="Senha"/>
            <button type="submit">Acessar Minha Conta</button>

            <div th:if="${param.error}">
                <p style="color: red;">E-mail ou senha inválidos</p>
            </div>

            <div th:if="${param.logout}">
                <p style="color: green;">Logout realizado com sucesso.</p>
            </div>

            <p style="margin-top: 15px; text-align: center;">
                Esqueceu sua senha?
                <a th:href="@{/esqueci-senha}" style="color: #2e7d64; font-weight: bold;">Clique aqui!</a>
            </p>
        </form>
        <div class="register">
            Não tem cadastro? <a href="/">Crie sua conta!</a>
        </div>
    </div>
</div>

<!-- Alerta some após 5 segundos -->
<script>
    window.addEventListener("load", () => {
        const alertBox = document.querySelector(".custom-alert");
        if (alertBox) {
            setTimeout(() => {
                alertBox.style.display = "none";
            }, 5000);
        }

        const params = new URLSearchParams(window.location.search);
        if (params.get('verificacaoEmail') === 'true') {
            alert("Para finalizar o cadastro, por favor verifique seu e-mail e confirme sua conta.");
            setTimeout(() => {
                window.location.href = "/auth/login";
            }, 100);
        }
    });
</script>

</body>
</html>
