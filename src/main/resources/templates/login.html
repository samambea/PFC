<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apollo Pesquisas - Login</title>
    <style>
        /* Estilização global da página */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
        }

        /* Container centralizado para layout flexível */
        .container {
            display: flex;
            height: 100vh;
            align-items: center;
            justify-content: center;
        }

        /* Coluna esquerda com ilustração e frase */
        .left {
            width: 50%;
            text-align: center;
            padding: 2rem;
        }

        /* Elipse decorativa */
        .ellipse {
            width: 380px;
            height: 280px;
            background: repeating-linear-gradient(
                    45deg,
                    #cceeee,
                    #cceeee 10px,
                    #b8dada 10px,
                    #b8dada 20px
            );
            border-radius: 50% / 40%;
            margin: 0 auto 1rem;
        }

        .left p {
            max-width: 400px;
            margin: 0 auto;
            font-size: 14px;
            color: #333;
        }

        /* Coluna direita com o formulário de login */
        .right {
            width: 400px;
            background-color: #2AA184;
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            color: white;
            text-align: center;
        }

        /* Logo da plataforma */
        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            position: relative;
        }

        /* Imagem da logo */
        .logo-img {
            width: 180px;
            display: block;
            margin: 0 auto;
        }

        /* Formulário de login */
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        /* Campos de entrada */
        input[type="text"],
        input[type="password"] {
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Botão de login */
        button {
            background-color: white;
            color: #26A69A;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        /* Área de registro e links */
        .register {
            margin-top: 1rem;
            font-size: 14px;
        }

        .register a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        /* Ícone de home no canto superior esquerdo */
        .home-icon {
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .home-icon img {
            width: 30px;
        }
    </style>
</head>
<body>
<!-- Mensagem de sucesso (ex: cadastro realizado) exibida dinamicamente -->
<div th:if="${successMessage}" class="alert success">
    <p th:text="${successMessage}"></p>
</div>

<!-- Ícone de home para voltar à página inicial -->
<div class="home-icon">
    <a href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
    </a>
</div>

<!-- Container principal com duas colunas: esquerda (ilustração/texto) e direita (formulário) -->
<div class="container">
    <div class="left">
        <div class="ellipse"></div>
        <p>
            A pesquisa começa com um login.
        </p>
    </div>
    <div class="right">
        <div class="logo">
            <!-- Logo da plataforma -->
            <img src="/images/logo-apollo.png" alt="Apollo Pesquisas" class="logo-img">
        </div>
        <!-- Formulário de login -->
        <form th:action="@{/auth/login}" method="post">
            <!-- Campo para e-mail do usuário -->
            <input type="text" name="username" placeholder="E-mail"/>
            <!-- Campo para senha do usuário -->
            <input type="password" name="password" placeholder="Senha"/>
            <!-- Botão para submeter o login -->
            <button type="submit">Acessar Minha Conta</button>
            <!-- Mensagem de erro caso o login seja inválido -->
            <div th:if="${param.error}">
                <p style="color: red;">E-mail ou senha inválidos</p>
            </div>
            <!-- Mensagem de sucesso ao realizar logout -->
            <div th:if="${param.logout}">
                <p style="color: green;">Logout realizado com sucesso.</p>
            </div>
            <!-- Link para recuperação de senha -->
            <p style="margin-top: 15px; text-align: center;">
                Esqueceu sua senha?
                <a th:href="@{/esqueci-senha}" style="color: #2e7d64; font-weight: bold;">Clique aqui!</a>
            </p>
        </form>
        <!-- Link para cadastro, caso o usuário ainda não tenha conta -->
        <div class="register">
            Não tem cadastro? <a href="/">Crie sua conta!</a>
        </div>
    </div>
</div>
</body>
</html>
