<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Apollo Pesquisas - Login</title>
    <style>
        /* Estilização global da página */
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Imagem de fundo */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("/images/scientist.jpg") no-repeat center center / cover;
            filter: grayscale(100%) opacity(0.2);
            z-index: -1;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            width: 100%;
            max-width: 900px;
        }

        .right {
            width: 400px;
            background-color: #2AA184;
            border-radius: 12px;
            padding: 3rem 2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
            color: white;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .logo-img {
            width: 180px;
            display: block;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }

        input[type="text"],
        input[type="password"] {
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background-color: white;
            color: #26A69A;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        .register {
            margin-top: 1rem;
            font-size: 14px;
        }

        .register a {
            color: white;
            font-weight: bold;
            text-decoration: none;
        }

        .home-icon {
            position: absolute;
            top: 1rem;
            left: 1rem;
        }

        .home-icon img {
            width: 30px;
        }

        .custom-alert {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background-color: #d4edda;
            color: #155724;
            padding: 1rem 2rem;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
            animation: fadeSlideDown 0.5s ease-out;
        }

        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
    </style>
</head>
<body>

<!-- Alerta de sucesso exibido quando a variável successMessage estiver presente -->
<div th:if="${successMessage}" class="custom-alert success">
    <span th:text="${successMessage}"></span>
</div>

<!-- Ícone de home que redireciona para a página inicial -->
<div class="home-icon">
    <a href="/">
        <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png" alt="Home">
    </a>
</div>

<!-- Container principal do layout de login -->
<div class="container">
    <div class="right">
        <div class="logo">
            <!-- Logo da aplicação -->
            <img src="/images/logo-apollo.png" alt="Apollo Pesquisas" class="logo-img">
        </div>

        <!-- Formulário de login que envia dados via POST para /auth/login -->
        <form th:action="@{/auth/login}" method="post">
            <!-- Campo para usuário (email) -->
            <input type="text" name="username" placeholder="E-mail"/>
            <!-- Campo para senha -->
            <input type="password" name="password" placeholder="Senha"/>
            <!-- Botão para submeter o formulário -->
            <button type="submit">Acessar Minha Conta</button>

            <!-- Mensagem de erro exibida caso o parâmetro 'error' esteja presente na URL -->
            <div th:if="${param.error}">
                <p style="color: red;">E-mail ou senha inválidos</p>
            </div>

            <!-- Mensagem de logout exibida caso o parâmetro 'logout' esteja presente na URL -->
            <div th:if="${param.logout}">
                <p style="color: green;">Logout realizado com sucesso.</p>
            </div>

            <!-- Link para recuperação de senha -->
            <p style="margin-top: 15px; text-align: center;">
                Esqueceu sua senha?
                <a th:href="@{/esqueci-senha}" style="color: #2e7d64; font-weight: bold;">Clique aqui!</a>
            </p>
        </form>

        <!-- Link para cadastro caso o usuário não tenha conta -->
        <div class="register">
            Não tem cadastro? <a href="/">Crie sua conta!</a>
        </div>
    </div>
</div>

<script>
    // Ao carregar a página, esconde o alerta de sucesso após 5 segundos
    window.addEventListener("load", () => {
        const alertBox = document.querySelector(".custom-alert");
        if (alertBox) {
            setTimeout(() => {
                alertBox.style.display = "none";
            }, 5000);
        }

        // Verifica se o parâmetro 'verificacaoEmail' está na URL para alertar o usuário
        const params = new URLSearchParams(window.location.search);
        if (params.get('verificacaoEmail') === 'true') {
            alert("Para finalizar o cadastro, por favor verifique seu e-mail e confirme sua conta.");
            setTimeout(() => {
                window.location.href = "/auth/login";
            }, 100);
        }
    });
</script>

</body>

</html>
