<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Pesquisas</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2AA184;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
        }

        th {
            background-color: #2AA184;
            color: white;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Container de ações (Editar/Excluir) */
        .acoes-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px; /* Espaçamento entre botões */
        }

        .btn-voltar {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #2AA184;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-voltar:hover {
            background-color: #23846c;
        }

        .btn {
            padding: 6px 12px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-edit {
            background-color: #d0f0e8;
            color: #2e7d64;
        }

        .btn-edit:hover {
            background-color: #c2e6dc;
        }

        .btn-delete {
            background-color: #fbd6d4;
            color: #d64545;
        }

        .btn-delete:hover {
            background-color: #f9c9c7;
        }
    </style>
</head>
<body>

<!-- Título da página que lista as pesquisas cadastradas -->
<h1>Pesquisas Cadastradas</h1>

<!-- Tabela que exibe as pesquisas -->
<table>
    <thead>
    <tr>
        <th>Nome</th>
        <th>Área</th>
        <th>Status</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <!-- Loop Thymeleaf para listar cada pesquisa -->
    <tr th:each="pesquisa : ${pesquisas}">
        <!-- Exibe o nome da pesquisa -->
        <td th:text="${pesquisa.nomePesquisa}">Nome</td>
        <!-- Exibe a área da pesquisa -->
        <td th:text="${pesquisa.areaDaPesquisa}">Área</td>
        <!-- Exibe o status da pesquisa -->
        <td th:text="${pesquisa.statusPesquisa}">Status</td>
        <td>
            <div class="acoes-container">
                <!-- Botão para editar a pesquisa -->
                <a th:href="@{'/admin/pesquisas/editar/' + ${pesquisa.pesquisaId}}" class="btn btn-edit">Editar</a>
                <!-- Botão para excluir a pesquisa, com confirmação -->
                <a th:href="@{'/admin/pesquisas/deletar/' + ${pesquisa.pesquisaId}}"
                   class="btn btn-delete"
                   onclick="return confirm('Tem certeza que deseja excluir esta pesquisa?')">Excluir</a>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<!-- Link para voltar à página administrativa de usuários -->
<a href="/admin/usuarios" class="btn-voltar">⬅ Voltar</a>

</body>

</html>
