<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Editar Pesquisador - Apollo Pesquisas</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
            background-color: #2AA184;
            color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 22px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        label {
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        input {
            padding: 0.5rem;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: white;
            color: #2AA184;
            padding: 0.7rem;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.3s ease;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #e6f3f1;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Editar Pesquisador</h2>
    <form th:action="@{/admin/usuarios/salvar-pesquisador}" th:object="${usuario}" method="post">
        <input type="hidden" th:field="*{usuarioId}" />

        <label>Nome:
            <input type="text" th:field="*{nome}" />
        </label>

        <label>Email:
            <input type="email" th:field="*{email}" />
        </label>

        <label>CRM:
            <input type="text" th:field="*{crm}" />
        </label>

        <label>Especialidade:
            <input type="text" th:field="*{especialidade}" />
        </label>

        <label>Área de Pesquisa:
            <input type="text" th:field="*{areaDePesquisa}" />
        </label>

        <button type="submit">Salvar</button>
    </form>
</div>
</body>
</html>
