<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Perfil Pesquisador - Apollo Pesquisas</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #f2f4f3;
        }
        .navbar {
            background-color: #2AA184;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        .navbar .logo {
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .navbar .profile-button {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .sidebar {
            background-color: #2AA184;
            width: 220px;
            min-height: calc(100vh - 60px);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
        }
        .sidebar a {
            padding: 15px 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }
        .sidebar a.active, .sidebar a:hover {
            background-color: #d6e9e7;
            color: #000;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
        }
        .content {
            flex: 1;
            padding: 40px;
        }
        .main {
            display: flex;
        }
        .profile-card {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ccc;
        }
        .profile-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .profile-info .name {
            font-size: 24px;
            font-weight: bold;
            color: #000;
        }
        .profile-info .detail {
            font-size: 16px;
            color: #333;
        }
        .upload-container {
        margin-top: 30px;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        width: fit-content;
    }

    .custom-file-input {
        display: none;
    }

    .file-label {
        background-color: #2AA184;
        color: white;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        margin-right: 10px;
        display: inline-block;
        transition: background 0.3s ease;
    }

    .file-label:hover {
        background-color: #239378;
    }

    .submit-btn {
        background-color: #000;
        color: #fff;
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease;
    }

    .submit-btn:hover {
        background-color: #333;
    }

    .file-name {
        display: inline-block;
        margin-top: 10px;
        color: #333;
        font-style: italic;
    }
    </style>
</head>
<body>
<div class="navbar">
    <div class="logo">Apollo Pesquisas</div>
    <a href="/home" class="profile-button">Tela Inicial</a>
</div>

<div class="main">
    <div class="sidebar">
        <a href="#" class="active">Meu Perfil</a>
        <a href="/pesquisas/minhas">Minhas Pesquisas</a>
        <a href="/perfil/voluntarios-inscritos">Voluntários Inscritos</a>
        <a href="/pesquisador/agenda">Minha Agenda</a>
    </div>
    <div class="content">
        <div class="profile-card">
            <img th:src="@{'/imagens/' + ${usuario.imagemPerfil}}" alt="" class="avatar"/>
            <div class="profile-info">
                <div class="name" th:text="${usuario.nome}">Nome Completo</div>
                <div class="detail">
                    <span th:text="'Contato: ' + ${usuario.email}">Contato</span>
                </div>
            </div>
        </div>

        <!-- Formulário para upload de imagem -->
        <div class="upload-container">
            <form method="post" action="/perfil/perfil/upload-foto" enctype="multipart/form-data">
                <label class="file-label" for="fotoPerfil">Escolher Imagem</label>
                <input type="file" id="fotoPerfil" name="fotoPerfil" class="custom-file-input" accept="image/*" required onchange="mostrarNomeArquivo()">
                <button type="submit" class="submit-btn">Enviar</button>
                <div id="nomeArquivo" class="file-name"></div>
            </form>
        </div>
        <script>
            function mostrarNomeArquivo() {
                const input = document.getElementById('fotoPerfil');
                const nome = input.files.length > 0 ? input.files[0].name : '';
                document.getElementById('nomeArquivo').textContent = nome;
            }
        </script>
    </div>
</div>
</body>
</html>
