<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Início - Apollo Pesquisas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
        }

        .navbar {
            background-color: #2e7d64;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
        }

        .navbar a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 20px;
            font-size: 1em;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            background-color: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            color: #2e7d64;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            color: #444;
            margin-bottom: 30px;
        }

        .button {
            background-color: #2e7d64;
            color: #fff;
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
        }

        .button:hover {
            background-color: #256d56;
        }
    </style>
</head>
<body>


<div class="navbar">
    <div class="logo">
        Apollo Pesquisas
    </div>
    <div class="menu">
        <a href="/perfil">Meu Perfil</a>
        <a href="/perfil/editar">Editar Perfil</a>
        <a href="/logout">Sair</a>
    </div>
</div>


<div class="container">
    <h1>Bem-vindo ao Apollo Pesquisas</h1>
    <p>Essa é a página inicial do sistema. Aqui você pode navegar pelas funcionalidades disponíveis.</p>
</div>

</body>
</html>
