<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Participar da Pesquisa</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          background-color: #f8f8f8;
          padding: 30px;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
        }

        .container {
          background-color: #fff;
          border-radius: 10px;
          padding: 40px;
          box-shadow: 0 4px 8px rgba(0,0,0,0.1);
          text-align: center;
          max-width: 500px;
        }

        h3 {
          margin-bottom: 10px;
        }

        p {
          margin-bottom: 20px;
        }

        #participarBtn {
          background-color: #4CAF50;
          color: white;
          border: none;
          padding: 12px 24px;
          font-size: 16px;
          border-radius: 6px;
          cursor: pointer;
          transition: background-color 0.3s ease;
        }

        #participarBtn:hover {
          background-color: #45a049;
        }

        #mensagem {
          margin-top: 20px;
          font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <h3>Instituição: UMC</h3>
    <p>Descrição: Avalia a influência de hábitos alimentares no sono</p>
    <button id="participarBtn">Quero Participar</button>
    <p id="mensagem" style="color: green;"></p>
</div>

<script>
    const usuarioLogado = true;

    document.getElementById("participarBtn").addEventListener("click", function () {
      if (!usuarioLogado) {
        alert("Para confirmar sua inscrição, efetue o login.");
        window.location.href = "/login";
      } else {
        const confirmar = confirm("Deseja confirmar sua participação nesta pesquisa?");
        if (confirmar) {
          const pesquisaId = "67f339c40d43f34a3cb71e2c";

          fetch(`/api/participacoes/pesquisa/${pesquisaId}`, {
            method: "POST"
          })
          .then(response => {
            if (!response.ok) {
              return response.text().then(text => { throw new Error(text || response.statusText); });
            }
            return response.text();
          })
          .then(mensagem => {
            document.getElementById("mensagem").textContent = mensagem;
            setTimeout(() => {
              window.location.href = "/perfil";
            }, 2000);
          })
          .catch(error => {
            alert("Erro ao participar: " + error.message);
          });
        }
      }
    });
</script>

</body>
</html>
