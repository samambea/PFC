<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Participar da Pesquisa</title>
    <style>
        /* Estilização global da página */
        body {
            font-family: Arial, sans-serif; /* Fonte simples e legível */
            background-color: #f8f8f8; /* Fundo claro e neutro */
            padding: 30px;
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center;     /* Centraliza verticalmente */
            height: 100vh;           /* Altura total da viewport */
        }

        /* Container branco com sombra para destaque */
        .container {
            background-color: #fff;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
        }

        /* Título da instituição */
        h3 {
            margin-bottom: 10px;
        }

        /* Descrição da pesquisa */
        p {
            margin-bottom: 20px;
        }

        /* Botão principal para participar */
        #participarBtn {
            background-color: #4CAF50; /* Verde */
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        /* Efeito hover no botão */
        #participarBtn:hover {
            background-color: #45a049;
        }

        /* Mensagem exibida após participação */
        #mensagem {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Nome da instituição da pesquisa -->
    <h3>Instituição: UMC</h3>
    <!-- Descrição breve da pesquisa -->
    <p>Descrição: Avalia a influência de hábitos alimentares no sono</p>
    <!-- Botão para o usuário confirmar participação -->
    <button id="participarBtn">Quero Participar</button>
    <!-- Espaço para exibir mensagens de sucesso ou erro -->
    <p id="mensagem" style="color: green;"></p>
</div>

<script>
    // Variável simulando se o usuário está logado (true = logado)
    const usuarioLogado = true;

    // Adiciona evento de clique ao botão "Quero Participar"
    document.getElementById("participarBtn").addEventListener("click", function () {
        // Se usuário não estiver logado, alerta e redireciona para login
        if (!usuarioLogado) {
            alert("Para confirmar sua inscrição, efetue o login.");
            window.location.href = "/login";
        } else {
            // Confirmação do usuário para participar da pesquisa
            const confirmar = confirm("Deseja confirmar sua participação nesta pesquisa?");
            if (confirmar) {
                // ID da pesquisa para envio da requisição
                const pesquisaId = "67f339c40d43f34a3cb71e2c";

                // Envia requisição POST para registrar participação
                fetch(`/api/participacoes/pesquisa/${pesquisaId}`, {
                    method: "POST"
                })
                    .then(response => {
                        // Verifica se a resposta foi OK, senão lança erro com mensagem
                        if (!response.ok) {
                            return response.text().then(text => { throw new Error(text || response.statusText); });
                        }
                        return response.text();
                    })
                    .then(mensagem => {
                        // Exibe mensagem de sucesso na página
                        document.getElementById("mensagem").textContent = mensagem;
                        // Após 2 segundos, redireciona para a página de perfil do usuário
                        setTimeout(() => {
                            window.location.href = "/perfil";
                        }, 2000);
                    })
                    .catch(error => {
                        // Em caso de erro, exibe alerta com a mensagem
                        alert("Erro ao participar: " + error.message);
                    });
            }
        }
    });
</script>

</body>
</html>
