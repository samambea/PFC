<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Instituição</title>
    <style>
        /* Estilização global da página */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; /* Fonte moderna e legível */
            background-color: #f4f4f4; /* Cor de fundo suave */
            padding: 20px;
        }

        /* Container centralizado do formulário */
        .form-container {
            background-color: #fff;
            max-width: 600px;
            margin: auto;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* Botão de voltar posicionado no topo à esquerda */
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #ccc;
            color: #333;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        /* Efeito hover no botão de voltar */
        .back-button:hover {
            background-color: #bbb;
        }

        /* Título principal do formulário */
        h2 {
            color: #2e7d64;
            text-align: center;
            margin-bottom: 30px;
        }

        /* Rótulos dos campos */
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        /* Campos de entrada */
        input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Botão de salvar */
        button {
            background-color: #2e7d64;
            color: #fff;
            padding: 14px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 30px;
            width: 100%;
            text-align: center;
            display: inline-block;
            font-family: inherit;
        }

        /* Efeito hover no botão */
        button:hover {
            background-color: #256d56;
        }

        * {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif !important;
        }
    </style>
</head>
<body>

<div class="form-container">
    <!-- Botão para voltar à página anterior -->
    <a href="/instituicoes" class="back-button">← Voltar</a>


    <h2>Cadastrar Nova Instituição</h2>

    <form th:action="@{/instituicoes/salvar}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <label for="nomeInstituicao">Nome:</label>
        <input type="text" id="nomeInstituicao" name="nomeInstituicao" required>

        <label for="cnpj">CNPJ:</label>
        <input type="text" id="cnpj" name="cnpj" required>

        <button type="submit">Salvar</button>
    </form>
</div>

</body>
</html>
