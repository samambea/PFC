<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Cadastro Admin - Apollo Pesquisas</title>
  <style>

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #f7f7f7;
    }
    body::before {
      content: "";
      position: absolute;
      background: url("/images/admin.jpg") no-repeat center / cover;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      filter: grayscale(100%) opacity(0.2);
      z-index: -1;
    }
    .container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .left {
    display: none;
    }
    .ellipse {
        width: 280px;
        height: 200px;
        background: repeating-linear-gradient(45deg, #cceeee, #cceeee 10px, #b8dada 10px, #b8dada 20px);
        border-radius: 50% / 40%;
        margin: 0 auto 1rem;
    }
    .left p {
        max-width: 400px;
        margin: 0 auto;
        font-size: 14px;
        color: #333;
    }
    .right {
        width: 100%;
        max-width: 420px;
        background-color: #2AA184;
        border-radius: 12px;
        padding: 2rem;
        box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        color: white;
        box-sizing: border-box;
    }
    .logo {
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        margin-bottom: 1.5rem;
        line-height: 1.2;
    }
    form {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
    }
    label {
        font-size: 14px;
        text-align: left;
    }
    input {
        padding: 0.5rem;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
    }
    button {
        background-color: white;
        color: #2AA184;
        padding: 0.7rem;
        border: none;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 15px;
        margin-top: 1rem;
        transition: background-color 0.3s ease;
    }
    button:hover {
        background-color: #e6f3f1;
    }
    .terms {
        font-size: 11px;
        text-align: center;
        margin-top: 0.5rem;
    }
    .login-link {
        margin-top: 1rem;
        font-size: 14px;
        text-align: center;
    }
    .login-link a {
        color: white;
        font-weight: bold;
        text-decoration: none;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Lado esquerdo, apenas decorativo (está oculto por padrão) -->
  <div class="left">
    <div class="ellipse"></div>
    <p>
      Cadastre um novo administrador para a plataforma Apollo Pesquisas.
    </p>
  </div>
  <!-- Lado direito: formulário de cadastro de administrador -->
  <div class="right">
    <div class="logo">
      <!-- Logo da aplicação -->
      <img src="/images/logo-apollo.png" alt="Apollo Pesquisas" style="max-width: 180px; margin: 0 auto 1.5rem auto; display: block;">
    </div>

    <!-- Formulário de cadastro de administrador.
         Os campos são preenchidos com os dados do objeto 'usuario' via Thymeleaf.
         Ao submeter, envia os dados via POST para o backend. -->
    <form id="formCadastroAdmin" th:action="@{/admin/usuarios/cadastrar-admin}" th:object="${usuario}" method="post">
      <!-- Campo para nome do administrador -->
      <label>Nome:</label>
      <input type="text" th:field="*{nome}" required />

      <!-- Campo para e-mail do administrador -->
      <label>E-mail:</label>
      <input type="email" th:field="*{email}" required />

      <!-- Campo para senha do administrador -->
      <label>Senha:</label>
      <input type="password" th:field="*{senha}" required />

      <!-- Aviso sobre permissões administrativas -->
      <div class="terms">Ao cadastrar um administrador, certifique-se de que essa pessoa terá permissões administrativas no sistema.</div>

      <!-- Botão para submeter o formulário e cadastrar o administrador -->
      <button type="submit">Cadastrar Admin</button>

      <!-- Link para login caso o usuário já tenha cadastro -->
      <div class="login-link">
        Já tem uma conta? <a href="/auth/login">Faça seu login!</a>
      </div>
    </form>
  </div>
</div>

</body>
</html>
