<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nova Sugestão</title>
    <style>
        /* Estilização global da página */
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; /* Fonte padrão */
            background-color: #f4f4f4; /* Cor de fundo suave */
            margin: 0;
            padding: 0;
        }

        /* Container centralizado para o formulário */
        .container {
            max-width: 600px; /* Largura máxima */
            margin: 40px auto; /* Centraliza vertical e horizontalmente */
            padding: 30px;
            background-color: #fff; /* Fundo branco */
            border-radius: 12px; /* Cantos arredondados */
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1); /* Sombra leve */
        }

        /* Título do formulário */
        h2 {
            color: #2e7d64; /* Cor personalizada */
            text-align: center;
            margin-bottom: 30px;
        }

        /* Rótulos dos campos */
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
            color: #333;
        }

        /* Estilo dos campos de entrada e textarea */
        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-top: 5px;
            font-size: 1em;
        }

        /* Botão de envio do formulário */
        button {
            background-color: #1e5f4c;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        /* Efeito hover no botão */
        button:hover {
            background-color: #144a3a;
        }

        /* Estilo para o botão de link */
        .link-button {
            display: block;
            text-align: center;
            margin-top: 20px;
            padding: 10px;
            background-color: #2e7d64;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Efeito hover no botão de link */
        .link-button:hover {
            background-color: #1e5f4c;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Título dinâmico: mostra "Editar Sugestão" se houver ID, senão "Nova Sugestão" -->
    <h2 th:text="${sugestao.sugestaoId != null ? 'Editar Sugestão' : 'Nova Sugestão'}"></h2>

    <!-- Formulário para criar ou editar sugestão -->
    <!-- O 'th:action' define para onde o formulário será enviado, dependendo se é edição ou novo -->
    <!-- O 'th:object' vincula o formulário ao objeto 'sugestao' -->
    <form th:action="@{${sugestao.sugestaoId != null} ? '/sugestoes/atualizar/' + ${sugestao.sugestaoId} : '/sugestoes'}" th:object="${sugestao}" method="post">

        <!-- Campo para o título da sugestão -->
        <label>Título:</label>
        <input type="text" th:field="*{titulo}" required>

        <!-- Campo para a descrição detalhada da sugestão -->
        <label>Descrição:</label>
        <textarea th:field="*{descricao}" rows="4" required></textarea>

        <!-- Campo para categoria da sugestão -->
        <label>Categoria:</label>
        <input type="text" th:field="*{categoria}" required>

        <!-- Campo para e-mail do usuário -->
        <label>E-mail:</label>
        <input type="email" th:field="*{email}" required>

        <!-- Botão para enviar o formulário -->
        <button type="submit">Salvar</button>
    </form>

    <!-- Botão comentado para voltar à lista de sugestões -->
    <!--    <a href="/sugestoes" class="link-button">← Voltar para Lista</a>-->

    <!-- Botão para voltar à página inicial -->
    <a href="/home" class="link-button">🏠 Voltar para Home</a>
</div>
</body>
</html>
