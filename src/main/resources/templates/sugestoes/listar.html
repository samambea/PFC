<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Sugestões</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2AA184;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
            vertical-align: middle;
        }

        th {
            background-color: #2AA184;
            color: white;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn {
            padding: 6px 12px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            margin-right: 5px;
            display: inline-block;
        }

        .btn-edit {
            background-color: #d0f0e8;
            color: #2e7d64;
        }

        .btn-edit:hover {
            background-color: #c2e6dc;
        }

        .btn-delete {
            background-color: #fbd6d4;
            color: #d64545;
        }

        .btn-delete:hover {
            background-color: #f9c9c7;
        }

        .btn-voltar {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #2AA184;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
        }

        .btn-voltar:hover {
            background-color: #23846c;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        /* Alinhamento horizontal dos botões */
        .btn-group {
            display: flex;
            gap: 8px; /* espaçamento entre os botões */
        }

    </style>
</head>
<body>
<div class="container">
    <h1>Sugestões de Pesquisas Médicas</h1>

    <table>
        <thead>
        <tr>
            <th>Título</th>
            <th>Categoria</th>
            <th>Data</th>
            <th>Email</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sugestao : ${sugestoes}">
            <td th:text="${sugestao.titulo}">Título</td>
            <td th:text="${sugestao.categoria}">Categoria</td>
            <td th:text="${#temporals.format(sugestao.dataCriacao, 'dd/MM/yyyy HH:mm')}">Data</td>
            <td th:text="${sugestao.email}">Email</td>
            <td>
                <div class="btn-group">
                    <a th:href="@{'/sugestoes/editar/' + ${sugestao.sugestaoId}}" class="btn btn-edit">Editar</a>
                    <a th:href="@{'/sugestoes/excluir/' + ${sugestao.sugestaoId}}"
                       class="btn btn-delete"
                       onclick="return confirm('Confirmar exclusão?')">Excluir</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div>
        <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
           th:href="@{/admin/usuarios/lista-usuarios}"
           class="btn-voltar">⬅ Voltar</a>

        <a th:if="${#authorization.expression('hasRole(''PESQUISADOR'')')}"
           th:href="@{/home-pesquisador}"
           class="btn-voltar">⬅ Voltar</a>
    </div>
</div>
</body>
</html>
