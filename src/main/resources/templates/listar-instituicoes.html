<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Instituições</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f7f7f7;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2AA184;
            margin-bottom: 20px;
        }

        .btn-cadastrar {
            padding: 10px 20px;
            background-color: #2AA184;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 30px;
            display: inline-block;
            text-align: center;
        }

        .btn-cadastrar:hover {
            background-color: #23846c;
        }

        table {
            width: 100%;
            max-width: 900px;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            overflow: hidden;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #eaeaea;
        }

        th {
            background-color: #2AA184;
            color: white;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .btn {
            padding: 6px 12px;
            font-size: 14px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-edit {
            background-color: #d0f0e8;
            color: #2e7d64;
        }

        .btn-edit:hover {
            background-color: #c2e6dc;
        }

        .btn-delete {
            background-color: #fbd6d4;
            color: #d64545;
        }

        .btn-delete:hover {
            background-color: #f9c9c7;
        }

        .empty-message {
            margin-top: 20px;
            font-style: italic;
            color: #888;
        }

        .btn-voltar {
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #2AA184;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-voltar:hover {
            background-color: #23846c;
        }
    </style>
</head>
<body>

<h1>Instituições Cadastradas</h1>

<a href="/instituicoes/nova" class="btn-cadastrar">Cadastrar Instituição</a>

<table th:if="${instituicoes != null and !instituicoes.isEmpty()}">
    <thead>
    <tr>
        <th>Nome</th>
        <th>Ações</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="instituicao : ${instituicoes}">
        <td th:text="${instituicao.nomeInstituicao}">Nome da Instituição</td>
        <td>
            <a th:href="@{'/instituicoes/' + ${instituicao.instituicaoId} + '/editar'}" class="btn btn-edit">Editar</a>

            <form th:action="@{'/instituicoes/' + ${instituicao.instituicaoId} + '/excluir'}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-delete"
                        onclick="return confirm('Tem certeza que deseja excluir esta instituição?')">Excluir</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p th:if="${instituicoes == null or instituicoes.isEmpty()}" class="empty-message">Nenhuma instituição cadastrada.</p>

<a href="/admin/usuarios" class="btn-voltar">⬅ Voltar</a>

</body>
</html>
